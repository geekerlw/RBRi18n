name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild RBRi18n.vcxproj /p:Configuration=Release /p:Platform=Win32

      - name: Extract version
        id: ver
        shell: bash
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package
        shell: cmd
        run: Package.cmd ${{ steps.ver.outputs.v }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: Release/RBRi18n-v${{ steps.ver.outputs.v }}.zip
          generate_release_notes: true
